  <body>
    <div id="root"></div>
    <noscript>
      <div style="font-family: 'Open Sans', system-ui, -apple-system, sans-serif; color: #1e293b; background-color: #f8fafc; min-height: 100vh; padding: 0; margin: 0; line-height: 1.5;">
        <!-- Burgundy Header Banner -->
        <header style="background-color: #90051B; padding: 16px; text-align: center; border-bottom: 4px solid #730312;">
          <div style="display: inline-block;">
            <img 
              src="https://www.maukerja.my/mkt/images/mk/mau_new_red.webp" 
              alt="Maukerja Logo" 
              style="height: 36px; width: auto; filter: brightness(0) invert(1);"
            />
          </div>
        </header>

        <!-- Hero Card Content -->
        <main style="max-width: 800px; margin: 40px auto; padding: 32px; background-color: #ffffff; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; text-align: center;">
          <!-- Badge -->
          <div style="display: inline-block; background-color: #fef2f2; color: #90051B; font-weight: 800; font-size: 12px; padding: 6px 16px; border-radius: 9999px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px;">
            Hiring Solution
          </div>

          <h1 style="font-size: 30px; line-height: 1.2; font-weight: 800; color: #1e293b; margin: 0 0 16px 0; letter-spacing: -0.025em;">
            Post a Job and Hire Top Talents in Malaysia Within 72 Hours
          </h1>

          <p style="font-size: 16px; color: #64748b; line-height: 1.6; margin: 0 auto 32px auto; max-width: 620px;">
            Join over <strong style="color: #90051B;">15,000+ top employers</strong> in Malaysia already using Maukerja by AJobThing to find matching marketing, sales, and retail candidates instantly.
          </p>

          <!-- Warning Box -->
          <div style="background-color: #fffbeb; border-left: 4px solid #f59e0b; padding: 18px; margin-bottom: 32px; border-radius: 6px; text-align: left;">
            <p style="margin: 0; font-size: 14px; font-weight: 800; color: #b45309;">💡 JavaScript is Currently Disabled</p>
            <p style="margin: 6px 0 0 0; font-size: 13px; color: #78350f; line-height: 1.5;">
              Our interactive instant-hiring scheduler and custom position booking form require JavaScript. To book your hiring setup online in under 2 minutes, please enable JavaScript in your browser settings. Alternatively, you can connect with our sales hotlines or submit your requirements through our details below.
            </p>
          </div>

          <!-- Quick Action Buttons -->
          <div style="margin-bottom: 40px; display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;">
            <a href="mailto:employer@maukerja.my?subject=Hiring Inquiry" style="display: inline-block; background-color: #90051B; color: #ffffff; padding: 14px 28px; font-size: 15px; font-weight: bold; border-radius: 8px; text-decoration: none; box-shadow: 0 4px 6px -1px rgba(144, 5, 27, 0.2);">
              Email Recruitment Inquiry
            </a>
            <a href="https://www.maukerja.my" target="_blank" rel="noopener noreferrer" style="display: inline-block; background-color: #ffffff; color: #475569; border: 1px solid #cbd5e1; padding: 14px 28px; font-size: 15px; font-weight: bold; border-radius: 8px; text-decoration: none;">
              Visit Main Portal
            </a>
          </div>

          <!-- Divider -->
          <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 40px 0;" />

          <!-- Value Grid -->
          <h2 style="font-size: 20px; font-weight: 800; color: #1e293b; margin: 0 0 24px 0; text-align: center;">
            Why Hire on Maukerja?
          </h2>

          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; text-align: left; margin-bottom: 24px;">
            <div style="padding: 20px; background-color: #f8fafc; border-radius: 12px; border: 1px solid #f1f5f9;">
              <h3 style="font-size: 16px; font-weight: bold; color: #90051B; margin-top: 0; margin-bottom: 8px;">🚀 AI Recommended Talent</h3>
              <p style="font-size: 13px; color: #64748b; line-height: 1.5; margin: 0;">Our system automatically pre-screens and matches applications so you only review high-intent, qualified leads.</p>
            </div>
            <div style="padding: 20px; background-color: #f8fafc; border-radius: 12px; border: 1px solid #f1f5f9;">
              <h3 style="font-size: 16px; font-weight: bold; color: #90051B; margin-top: 0; margin-bottom: 8px;">📈 Massive Passive Reach</h3>
              <p style="font-size: 13px; color: #64748b; line-height: 1.5; margin: 0;">Syndicate job listings across multi-channel job boards, reaching over 5 million Malaysia talent pools.</p>
            </div>
            <div style="padding: 20px; background-color: #f8fafc; border-radius: 12px; border: 1px solid #f1f5f9;">
              <h3 style="font-size: 16px; font-weight: bold; color: #90051B; margin-top: 0; margin-bottom: 8px;">⏱️ Speed &amp; Efficiency</h3>
              <p style="font-size: 13px; color: #64748b; line-height: 1.5; margin: 0;">Receive qualified jobseeker responses immediately, with our average employer hiring in under 72 hours.</p>
            </div>
          </div>
        </main>

        <footer style="text-align: center; padding: 32px 16px; background-color: #1e293b; color: #94a3b8; font-size: 13px; border-top: 1px solid #334155;">
          <p style="margin: 0;">&copy; 2026 Maukerja by AJobThing. All rights reserved.</p>
          <p style="margin: 6px 0 0 0;">Empowering Malaysia recruitment with top sales, marketing, and retail talent matching.</p>
